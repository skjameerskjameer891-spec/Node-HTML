<!DOCTYPE html>
<html>
<head>
<title>NS Beauty Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>NS Beauty</h1>
<button onclick="toggleCart()">🛒 Cart (<span id="cart-count">0</span>)</button>
</header>

<section class="hero">
<h2>Luxury Cosmetics</h2>
<p>Discover premium skincare & makeup</p>
</section>

<section class="products">

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Luxury Lipstick</h3>
<p>₹499</p>
<button onclick="addToCart('Luxury Lipstick',499)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Glow Face Cream</h3>
<p>₹799</p>
<button onclick="addToCart('Glow Face Cream',799)">Add to Cart</button>
</div>

<div class="product">
<img src="https://via.placeholder.com/200">
<h3>Skin Serum</h3>
<p>₹999</p>
<button onclick="addToCart('Skin Serum',999)">Add to Cart</button>
</div>

</section>

<div class="cart" id="cart">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<p>Total: ₹<span id="total">0</span></p>

<h3>Checkout</h3>

<input placeholder="Full Name">
<input placeholder="Address">
<input placeholder="Phone Number">

<button onclick="checkout()">Place Order</button>

</div>

<script src="script.js"></script>

</body>
</html>
